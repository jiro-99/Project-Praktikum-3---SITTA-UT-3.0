<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login SITTA UT 3.0</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="login-page">
    <main id="loginApp" class="login-wrapper" v-cloak>
        <section class="login-card">
            <img
                src="assets/img/Logo UT.png"
                alt="Logo Universitas Terbuka"
                class="login-logo"
            >

            <span class="upgrade-tag">Update SITTA UT 3.0</span>
            <h1>SITTA UT</h1>
            <p class="login-subtitle">
                Sistem Informasi Pemesanan dan Tracking Bahan Ajar
            </p>

            <form @submit.prevent="submitLogin">
                <label for="email">Email</label>
                <input
                    id="email"
                    v-model.trim="form.email"
                    type="email"
                    placeholder="Masukkan email"
                    autocomplete="username"
                    required
                >

                <label for="password">Password</label>
                <div class="password-row">
                    <input
                        id="password"
                        v-model.trim="form.password"
                        :type="showPassword ? 'text' : 'password'"
                        placeholder="Masukkan password"
                        autocomplete="current-password"
                        required
                    >
                    <button
                        type="button"
                        class="password-toggle"
                        @click="togglePassword"
                    >
                        {{ showPassword ? 'Sembunyikan' : 'Lihat' }}
                    </button>
                </div>

                <button
                    type="submit"
                    class="primary-btn full-btn"
                    :disabled="isSubmitting"
                >
                    {{ isSubmitting ? 'Memproses...' : 'Login' }}
                </button>
            </form>

            <button
                type="button"
                class="login-help-btn"
                @click="showHelp"
            >
                Lihat akun demo
            </button>
        </section>
    </main>

    <script src="js/services/auth.js"></script>
    <script src="js/login-app.js"></script>
</body>
</html>
